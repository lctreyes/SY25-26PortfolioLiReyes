<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Movie Rating</title>
  <link rel="icon" href="/asset/Peppa-Pig-Logo.png" type="image/png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="card">
    <h1>Add/Update a Movie Rating</h1>

    <div class="form-group">
      <label for="title">Title:</label>
      <input type="text" id="title" placeholder="Enter movie title" />
    </div>

    <div class="form-group">
      <label for="year">Year:</label>
      <input type="text" id="year" placeholder="Enter release year" />
    </div>

    <div class="form-group">
      <label for="genre">Genre:</label>
      <select id="genre">
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="Animation">Animation</option>
        <option value="Comedy">Comedy</option>
        <option value="Crime">Crime</option>
        <option value="Drama">Drama</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Horror">Horror</option>
        <option value="Romance">Romance</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Thriller">Thriller</option>
      </select>
    </div>

    <div class="form-group">
      <label>Rating:</label>
      <div class="stars" id="star-rating">
        <span data-value="1">&#9733;</span>
        <span data-value="2">&#9733;</span>
        <span data-value="3">&#9733;</span>
        <span data-value="4">&#9733;</span>
        <span data-value="5">&#9733;</span>
      </div>
    </div>

    <button class="btn-add" id="add-btn">Add Movie</button>

    <h2>Movie List</h2>
    <div id="movie-list">
      <p class="empty-msg">No movies added yet.</p>
    </div>
  </div>

  <script type="module" src="./help.js"></script>
</body>
</html>
