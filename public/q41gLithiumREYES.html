
<div class="form-container">
    <h2>Add a New Movie</h2>
    <link rel="stylesheet" href="./q41gLithiumREYES.html">
    <input type="text" id="movieTitle" placeholder="Movie Title" required>
    
    <select id="movieGenre">
        <option value="" disabled selected>Select Genre</option>
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Drama">Drama</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Horror">Horror</option>
    </select>

    <div class="star-rating" id="starRating">
        <span class="star" data-value="1">&#9733;</span>
        <span class="star" data-value="2">&#9733;</span>
        <span class="star" data-value="3">&#9733;</span>
        <span class="star" data-value="4">&#9733;</span>
        <span class="star" data-value="5">&#9733;</span>
    </div>

    <button id="addMovieBtn">Add Movie</button>
</div>

<div id="movieList">
    <h3>Movie List</h3>
    <ul id="listContainer"></ul>
    <script type="module" src="./help.js"></script>
</div>
